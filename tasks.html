<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manddle · Tasks</title>
  <link rel="icon" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fdf6f0; --panel: #ffffff; --line: #ddd0c4; --text: #2d2d2d;
      --muted: #6b5e53; --accent: #ff9248; --accent-hover: #e07b2e;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
      --sidebar-width: 260px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-width); background: var(--panel); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; padding: 32px 0; position: fixed; height: 100vh; box-shadow: var(--shadow);
    }
    .sidebar-logo { text-align: center; margin-bottom: 48px; }
    .sidebar-logo img { height: 48px; }
    .nav-items { flex:1; display: flex; flex-direction: column; gap: 8px; padding: 0 20px; }
    .nav-item { display: block; padding: 12px 16px; text-decoration: none; color: var(--muted); font-weight: 500; border-radius: 12px; }
    .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
    .settings-link { margin: 0 20px 24px; padding-top: 24px; border-top: 1px solid var(--line); }
    .settings-link a { display: block; text-decoration: none; color: var(--muted); font-weight: 500; padding: 8px 0; }
    .settings-link a:hover { color: var(--accent); }
    .main { margin-left: var(--sidebar-width); flex:1; overflow-y: auto; padding: 32px; }
    .container { max-width: 900px; margin: 0 auto; }
    h2 { font-size: 1.8rem; font-weight: 600; margin-bottom: 8px; }
    .task-count { color: var(--muted); margin-bottom: 24px; }
    .task-list { display: flex; flex-direction: column; gap: 16px; }
    .task-card { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--line); box-shadow: var(--shadow); }
    .task-title { font-size: 1.2rem; font-weight: 600; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .task-period { background: var(--bg); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--accent); }
    .task-desc { color: var(--muted); margin: 12px 0; line-height: 1.5; }
    .task-status { display: inline-block; background: var(--bg); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
    .delete-btn { background: none; border: none; color: #e07b2e; cursor: pointer; font-size: 0.9rem; padding: 6px 12px; border-radius: 6px; }
    .delete-btn:hover { background: rgba(224,123,46,0.1); }
    .empty-state { text-align: center; padding: 60px 20px; background: var(--panel); border-radius: 16px; color: var(--muted); }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000; }
    .modal-content { background: var(--panel); border-radius: 24px; padding: 32px; max-width: 400px; width:90%; border:1px solid var(--line); }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: fixed; bottom:0; flex-direction: row; justify-content: space-around; padding: 8px 16px; border-right: none; border-top: 1px solid var(--line); }
      .sidebar-logo, .settings-link { display: none; }
      .nav-items { flex-direction: row; gap: 8px; padding: 0; }
      .nav-item { padding: 8px 12px; font-size: 0.8rem; }
      .main { margin-left: 0; margin-bottom: 60px; padding: 20px; }
    }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="Manddle"></div>
  <div class="nav-items">
    <a href="chat.html" class="nav-item">Chat</a>
    <a href="tasks.html" class="nav-item active">Tasks</a>
    <a href="today.html" class="nav-item">Today</a>
    <a href="progress.html" class="nav-item">Progress</a>
  </div>
  <div class="settings-link"><a href="#" id="openSettingsBtn">Settings</a></div>
</div>
<div class="main">
  <div class="container">
    <h2>All Tasks</h2>
    <div class="task-count" id="taskCount">0 tasks</div>
    <div id="taskList" class="task-list">Loading...</div>
  </div>
</div>
<div id="settingsModal" class="modal"><div class="modal-content"><h3>Settings</h3><p>Update your profile in Chat page.</p><button class="cancel-btn" id="closeModal">Close</button></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = { apiKey: "AIzaSyBIU3eJBA4ZFyuGV1aDhEUCNIBxhR582eI", authDomain: "manddle.firebaseapp.com", projectId: "manddle", storageBucket: "manddle.firebasestorage.app", messagingSenderId: "126135395338", appId: "1:126135395338:web:22fd0307b5afab46636bf3" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  auth.onAuthStateChanged(user => { if (!user) window.location.href = "login.html"; else loadTasks(user.uid); });
  async function loadTasks(uid) {
    const snap = await db.collection("tasks").where("uid", "==", uid).get();
    const container = document.getElementById("taskList");
    const countSpan = document.getElementById("taskCount");
    if (snap.empty) { container.innerHTML = '<div class="empty-state">No tasks yet. Create one in Chat.</div>'; countSpan.textContent = "0 tasks"; return; }
    let tasks = []; snap.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
    tasks.sort((a,b)=>(a.created_at||0)-(b.created_at||0));
    let html = "";
    tasks.forEach(t => { html += `<div class="task-card"><div class="task-title"><span>${escapeHtml(t.title)}</span><span class="task-period">${t.period||'daily'}</span></div>${t.description?`<div class="task-desc">${escapeHtml(t.description)}</div>`:''}<div style="display:flex; justify-content:space-between;"><span class="task-status">${t.status||'pending'}</span><button class="delete-btn" onclick="deleteTask('${t.id}')">Delete</button></div></div>`; });
    container.innerHTML = html;
    countSpan.textContent = `${snap.size} task${snap.size===1?'':'s'}`;
  }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  window.deleteTask = async (id) => { if(confirm("Delete this task?")) { await db.collection("tasks").doc(id).delete(); loadTasks(auth.currentUser.uid); } };
  document.getElementById("openSettingsBtn").onclick = (e) => { e.preventDefault(); document.getElementById("settingsModal").style.display = "flex"; };
  document.getElementById("closeModal").onclick = () => document.getElementById("settingsModal").style.display = "none";
</script>
</body>
</html>
