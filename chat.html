<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Manddle · Chat · Professional Mobile Menu</title>
  <!-- High‑resolution favicon -->
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fefaf5; --panel: #ffffff; --line: #f0e6dc; --text: #1c1c1e;
      --muted: #6e6e73; --primary-light: #FFE5B4; --secondary: #FFA500;
      --secondary-hover: #e69500; --bot-bg: #ffffff; --user-bg: #FFE5B4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --sidebar-width: 280px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 40px;
    }
    body { font-family: -apple-system, 'SF Pro Text', 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-weight: 450; letter-spacing: -0.2px; }

    /* ========== SIDEBAR (DESKTOP) ========== */
    .sidebar {
      width: var(--sidebar-width); background: var(--panel); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .sidebar-logo { padding: 32px 28px 36px 28px; display: flex; align-items: center; gap: 12px; }
    .sidebar-logo img { height: 44px; width: auto; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
    .sidebar-logo span { font-size: 1.55rem; font-weight: 590; background: linear-gradient(135deg, #2c2c2e 0%, var(--secondary) 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav-items { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 0 20px; }
    .nav-item, .settings-nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 18px;
      text-decoration: none; color: var(--muted); font-weight: 500; border-radius: var(--radius-md);
      transition: 0.2s;
    }
    .nav-item:hover, .settings-nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    .nav-item.active, .settings-nav-item.active { background: var(--primary-light); color: var(--secondary); font-weight: 540; }
    .profile-section { margin: 0 20px 20px 20px; border-top: 1px solid var(--line); padding-top: 16px; }
    .profile-item { padding: 12px 18px; border-radius: var(--radius-md); cursor: pointer; }
    .profile-item:hover { background: rgba(0,0,0,0.04); }

    /* MAIN CHAT AREA */
    .main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* Desktop status bar */
    .status-bar { padding: 14px 28px; background: var(--panel); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .status-left { display: flex; align-items: center; gap: 8px; }
    .status-indicator { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 0 2px rgba(46,204,113,0.2); }
    .round-logo { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(0,0,0,0.06); }
    .round-logo img { width: 100%; height: 100%; object-fit: cover; }

    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .chat-log { flex: 1; overflow-y: auto; padding: 28px 28px 100px 28px; display: flex; flex-direction: column; gap: 16px; }
    .message-wrapper { display: flex; align-items: flex-start; gap: 8px; max-width: 80%; animation: fadeSlideUp 0.25s ease; }
    .message-wrapper.user { margin-left: auto; flex-direction: row-reverse; }
    .message-wrapper.bot { margin-right: auto; }
    .message { padding: 12px 18px; line-height: 1.45; font-size: 0.95rem; border-radius: 22px; box-shadow: var(--shadow-sm); }
    .message-wrapper.user .message { background: var(--user-bg); border-bottom-right-radius: 6px; }
    .message-wrapper.bot .message { background: var(--bot-bg); border-bottom-left-radius: 6px; border: 1px solid var(--line); }
    .delete-msg { opacity: 0; background: transparent; border: none; font-size: 16px; cursor: pointer; color: var(--muted); padding: 6px; border-radius: 20px; width: 28px; height: 28px; transition: 0.2s; }
    .message-wrapper:hover .delete-msg { opacity: 0.6; }
    .delete-msg:hover { opacity: 1 !important; background: rgba(0,0,0,0.08); color: #e03a3a; }
    .message-system { background: #f5f0ea; color: var(--muted); margin: 8px auto; text-align: center; max-width: 80%; font-size: 13px; border-radius: 40px; padding: 8px 16px; }

    /* FLOATING INPUT - base (desktop) */
    .input-area { 
      position: absolute; 
      bottom: 24px; 
      left: 28px; 
      right: 28px; 
      display: flex; 
      gap: 12px; 
      padding: 8px 8px 8px 20px; 
      background: rgba(255,255,255,0.96); 
      backdrop-filter: blur(16px); 
      border-radius: var(--radius-pill); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.08); 
      border: 1px solid rgba(255,165,0,0.3);
      z-index: 20;
    }
    .input-area:focus-within { box-shadow: 0 8px 28px rgba(255,165,0,0.15); border-color: var(--secondary); }
    .input-area input { flex: 1; padding: 12px 0; border: none; background: transparent; outline: none; font-size: 16px; }
    .input-area button { padding: 8px 24px; background: var(--secondary); color: white; border: none; font-weight: 590; border-radius: var(--radius-pill); font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
    .input-area button:hover { background: var(--secondary-hover); transform: scale(0.96); }

    /* MODAL */
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--panel); padding: 32px; max-width: 420px; width: 90%; border-radius: var(--radius-lg); border: 1px solid var(--line); }
    .modal-content h3 { margin-bottom: 20px; font-weight: 620; font-size: 1.65rem; }
    .modal-content input { width: 100%; padding: 12px; border: 1px solid var(--line); background: var(--bg); border-radius: var(--radius-md); margin-bottom: 16px; }
    .modal-buttons { display: flex; gap: 12px; margin-top: 8px; }
    .modal-buttons button { padding: 12px 20px; border-radius: var(--radius-pill); font-weight: 520; cursor: pointer; }
    .save-btn { background: var(--secondary); color: white; border: none; }
    .cancel-btn { background: var(--bg); color: var(--text); border: 1px solid var(--line); }

    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-log::-webkit-scrollbar { width: 6px; }
    .chat-log::-webkit-scrollbar-track { background: transparent; }
    .chat-log::-webkit-scrollbar-thumb { background: #d4cdc3; border-radius: 10px; }

    /* ========== MOBILE SPECIFIC ========== */
    .mobile-top-left, .mobile-top-right {
      display: none;
      position: fixed;
      z-index: 150;
      background: var(--panel);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }
    .mobile-top-left { top: 20px; left: 20px; }
    .mobile-top-right { top: 20px; right: 20px; font-size: 24px; font-weight: 500; color: var(--secondary); background: var(--panel); }
    .mobile-top-left img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: block; }
    .mobile-top-right:hover, .mobile-top-left:hover { transform: scale(1.02); background: var(--primary-light); }

    .mobile-bottom-menu {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: var(--panel);
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
      padding: 24px 20px 28px;
      z-index: 200;
      flex-direction: column;
      gap: 12px;
      border: 1px solid var(--line);
    }
    .mobile-bottom-menu.show { display: flex; animation: fadeSlideUpMobile 0.2s ease-out; }
    @keyframes fadeSlideUpMobile { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .close-menu-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--muted); align-self: flex-end; line-height: 1; padding: 6px 12px; border-radius: 40px; }
    .close-menu-btn:hover { background: rgba(0,0,0,0.05); }
    .nav-items-mobile { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .nav-item-mobile { display: block; padding: 14px 18px; text-decoration: none; color: var(--text); border-radius: 60px; font-weight: 500; background: var(--bg); text-align: center; font-size: 1rem; letter-spacing: -0.2px; }
    .nav-item-mobile.active-mobile { background: var(--primary-light); color: var(--secondary); font-weight: 600; }
    .nav-item-mobile:active { transform: scale(0.97); }
    .mobile-profile-item { padding: 14px 18px; cursor: pointer; border-radius: 60px; background: var(--bg); color: var(--text); font-weight: 500; text-align: center; margin-top: 4px; }
    .mobile-profile-item:active { transform: scale(0.97); background: rgba(0,0,0,0.04);}
    hr.mobile-divider { margin: 8px 0; border-color: var(--line); }

    /* ========== RESPONSIVE: MOBILE FIXES ========== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; height: 100vh; }
      .status-bar { display: none; }
      /* Extra padding at bottom of chat log to prevent content hiding behind input */
      .chat-log { padding: 80px 20px 140px 20px; }
      /* Input area moved upward with blank space below (bottom: 60px) */
      .input-area {
        left: 16px;
        right: 16px;
        bottom: 60px;          /* move up, leaving empty space below */
        padding: 6px 6px 6px 16px;
        background: rgba(255,255,255,0.98);
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      .message-wrapper { max-width: 88%; }
      .mobile-top-left, .mobile-top-right { display: flex; }
    }
    @media (min-width: 769px) {
      .mobile-top-left, .mobile-top-right, .mobile-bottom-menu { display: none !important; }
    }
  </style>
</head>
<body>
<!-- DESKTOP SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="Manddle"><span>Manddle</span></div>
  <div class="nav-items">
    <a href="chat.html" class="nav-item active">Chat</a>
    <a href="tasks.html" class="nav-item">Tasks</a>
    <a href="today.html" class="nav-item">Today</a>
    <a href="progress.html" class="nav-item">Progress</a>
    <a href="settings.html" class="settings-nav-item">Settings</a>
  </div>
  <div class="profile-section"><div class="profile-item" id="profileBtn">Profile</div></div>
</div>

<!-- MAIN CHAT INTERFACE -->
<div class="main">
  <div class="status-bar">
    <div class="status-left"><span class="status-indicator"></span><span id="statusText">Loading...</span></div>
    <div class="round-logo"><img src="logo.png" alt="logo" onerror="this.style.display='none'"></div>
  </div>
  <div class="chat-container">
    <div class="chat-log" id="chatBox"></div>
    <div class="input-area"><input id="msgInput" placeholder="Type your message..."><button id="sendBtn">Send</button></div>
  </div>
</div>

<!-- MOBILE FLOATING BUTTONS -->
<div class="mobile-top-left" id="mobileLogoBtn">
  <img src="logo.png" alt="Manddle" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 32 32\'%3E%3Ccircle cx=\'16\' cy=\'16\' r=\'14\' fill=\'%23FFE5B4\' stroke=\'%23FFA500\' stroke-width=\'0.8\'/%3E%3C/svg%3E';">
</div>
<div class="mobile-top-right" id="mobileMenuBtn">☰</div>

<!-- MOBILE BOTTOM MENU -->
<div class="mobile-bottom-menu" id="mobileMenuPanel">
  <div style="display: flex; justify-content: flex-end;"><button class="close-menu-btn" id="closeMobileMenuBtn">✕</button></div>
  <div class="nav-items-mobile">
    <a href="chat.html" class="nav-item-mobile active-mobile" data-nav="chat">Chat</a>
    <a href="tasks.html" class="nav-item-mobile" data-nav="tasks">Tasks</a>
    <a href="today.html" class="nav-item-mobile" data-nav="today">Today</a>
    <a href="progress.html" class="nav-item-mobile" data-nav="progress">Progress</a>
    <a href="settings.html" class="nav-item-mobile" data-nav="settings">Settings</a>
    <hr class="mobile-divider">
    <div class="mobile-profile-item" id="mobileProfileBtn">Profile & Preferences</div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal"><div class="modal-content"><h3>Profile</h3><label>AI Name</label><input type="text" id="aiNameInput" placeholder="Manddle"><label>Your Name</label><input type="text" id="userNameInput" placeholder="User"><label>Interests</label><input type="text" id="interestsInput" placeholder="e.g., productivity"><div class="modal-buttons"><button class="save-btn" id="saveProfileBtn">Save</button><button class="cancel-btn" id="closeProfileBtn">Cancel</button></div></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  // ---------- FIREBASE INIT ----------
  const firebaseConfig = { apiKey: "AIzaSyBIU3eJBA4ZFyuGV1aDhEUCNIBxhR582eI", authDomain: "manddle.firebaseapp.com", projectId: "manddle", storageBucket: "manddle.firebasestorage.app", messagingSenderId: "126135395338", appId: "1:126135395338:web:22fd0307b5afab46636bf3" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.firestore();
  let currentUser = null, currentProfile = null, allTasksCache = [], isSending = false;
  const chatBox = document.getElementById("chatBox"), statusSpan = document.getElementById("statusText");
  const BACKEND_URL = location.hostname === "localhost"
    ? "http://127.0.0.1:5000/chat"
    : "https://manddle-backend.onrender.com/chat";
  
  // Profile modal elements
  const profileModal = document.getElementById("profileModal"), profileBtn = document.getElementById("profileBtn"), closeProfileBtn = document.getElementById("closeProfileBtn"), saveProfileBtn = document.getElementById("saveProfileBtn");
  const aiNameInput = document.getElementById("aiNameInput"), userNameInput = document.getElementById("userNameInput"), interestsInput = document.getElementById("interestsInput");

  // MOBILE ELEMENTS
  const mobileMenuBtn = document.getElementById("mobileMenuBtn");
  const mobileMenuPanel = document.getElementById("mobileMenuPanel");
  const closeMobileMenu = document.getElementById("closeMobileMenuBtn");
  const mobileProfileBtn = document.getElementById("mobileProfileBtn");
  const mobileLogoBtn = document.getElementById("mobileLogoBtn");

  // Helper: close bottom menu
  function closeBottomMenu() { if(mobileMenuPanel) mobileMenuPanel.classList.remove("show"); }
  function openBottomMenu() { if(mobileMenuPanel) mobileMenuPanel.classList.add("show"); }
  function toggleMobileMenu(e) { e?.stopPropagation(); if(mobileMenuPanel.classList.contains("show")) closeBottomMenu(); else openBottomMenu(); }
  function handleDocumentClick(e) {
    if(!mobileMenuPanel) return;
    const isMenuClick = mobileMenuPanel.contains(e.target);
    const isMenuBtnClick = mobileMenuBtn?.contains(e.target);
    if(!isMenuClick && !isMenuBtnClick && mobileMenuPanel.classList.contains("show")) closeBottomMenu();
  }
  if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", toggleMobileMenu);
  if (closeMobileMenu) closeMobileMenu.addEventListener("click", closeBottomMenu);
  document.addEventListener("click", handleDocumentClick);
  if (mobileMenuPanel) mobileMenuPanel.addEventListener("click", (e) => e.stopPropagation());
  if (mobileLogoBtn) mobileLogoBtn.addEventListener("click", () => { window.location.href = "chat.html"; });

  // Set active class on mobile menu items
  function setActiveMobileMenuItem() {
    const currentPath = window.location.pathname;
    const mobileLinks = document.querySelectorAll('.nav-item-mobile');
    mobileLinks.forEach(link => {
      const href = link.getAttribute('href');
      if(href && currentPath.includes(href)) link.classList.add('active-mobile');
      else link.classList.remove('active-mobile');
    });
  }

  // Profile modal logic
  function showProfileModal() {
    if(currentProfile){
      aiNameInput.value = currentProfile.ai_name || "Manddle";
      userNameInput.value = currentProfile.user_name || "User";
      interestsInput.value = currentProfile.interests || "general";
    }
    profileModal.style.display = "flex";
  }
  profileBtn.onclick = showProfileModal;
  if(mobileProfileBtn) mobileProfileBtn.onclick = () => { closeBottomMenu(); showProfileModal(); };
  closeProfileBtn.onclick = () => profileModal.style.display = "none";
  saveProfileBtn.onclick = async () => {
    if(!currentUser) return;
    await db.collection("profiles").doc(currentUser.uid).set({ ai_name: aiNameInput.value, user_name: userNameInput.value, interests: interestsInput.value }, { merge: true });
    currentProfile = { ...currentProfile, ai_name: aiNameInput.value, user_name: userNameInput.value, interests: interestsInput.value };
    profileModal.style.display = "none";
    if(statusSpan) statusSpan.innerText = `${currentUser.email} · AI: ${currentProfile.ai_name}`;
  };

  // Message helpers
  function addMessageWithDelete(role, text, docId = null) {
    const wrapper = document.createElement("div");
    wrapper.className = `message-wrapper ${role === "user" ? "user" : "bot"}`;
    const msgDiv = document.createElement("div");
    msgDiv.className = "message";
    msgDiv.textContent = text;
    const delBtn = document.createElement("button");
    delBtn.innerHTML = "✕";
    delBtn.className = "delete-msg";
    delBtn.onclick = async (e) => {
      e.stopPropagation();
      if (docId) { await db.collection("messages").doc(docId).delete(); wrapper.remove(); }
    };
    wrapper.appendChild(msgDiv);
    wrapper.appendChild(delBtn);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
    return wrapper;
  }
  function addSystemMessage(text) {
    const div = document.createElement("div");
    div.className = "message-system";
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Auth & data
  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;
    if(statusSpan) statusSpan.innerText = user.email;
    await loadProfile();
    await loadAllTasks();
    await loadMessages();
    setActiveMobileMenuItem();
  });

  async function loadProfile() {
    try {
      const doc = await db.collection("profiles").doc(currentUser.uid).get();
      currentProfile = doc.exists ? doc.data() : { user_name: "User", interests: "general", ai_name: "Manddle" };
      if(statusSpan) statusSpan.innerText = `${currentUser.email} · AI: ${currentProfile.ai_name}`;
    } catch (e) { currentProfile = { user_name: "User", interests: "general", ai_name: "Manddle" }; }
  }
  async function loadMessages() {
    try {
      const snap = await db.collection("messages").where("uid", "==", currentUser.uid).get();
      let msgs = [];
      snap.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
      msgs.sort((a, b) => (a.time || 0) - (b.time || 0));
      chatBox.innerHTML = "";
      if (msgs.length === 0) addSystemMessage("No messages yet. Start a conversation.");
      else msgs.forEach(m => addMessageWithDelete(m.role, m.text, m.id));
    } catch (e) { addSystemMessage("Could not load history."); }
  }
  async function loadAllTasks() {
    try {
      const snap = await db.collection("tasks").where("uid", "==", currentUser.uid).get();
      let tasks = [];
      snap.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
      tasks.sort((a, b) => (a.created_at || 0) - (b.created_at || 0));
      allTasksCache = tasks;
    } catch (e) { console.error(e); }
  }

  // Send message
  document.getElementById("sendBtn").onclick = sendMessage;
  document.getElementById("msgInput").addEventListener("keypress", e => e.key === "Enter" && sendMessage());

  async function sendMessage() {
    if (isSending) return;
    isSending = true;
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (!text || !currentUser) { isSending = false; return; }
    input.value = "";
    const userMsgRef = await db.collection("messages").add({ uid: currentUser.uid, role: "user", text, time: Date.now() });
    addMessageWithDelete("user", text, userMsgRef.id);
    try {
      await loadAllTasks();
      await loadProfile();
      const snapHist = await db.collection("messages").where("uid", "==", currentUser.uid).get();
      let rawHist = [];
      snapHist.forEach(doc => rawHist.push({ ...doc.data(), id: doc.id }));
      rawHist.sort((a, b) => (a.time || 0) - (b.time || 0));
      const history = rawHist.map(m => ({ text: m.text, role: m.role === "bot" ? "assistant" : m.role }));
      const tasksContext = allTasksCache.map((t, i) => ({ number: i + 1, title: t.title, description: t.description || "", status: t.status, period: t.period }));
      const res = await fetch(BACKEND_URL, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history, profile: currentProfile, tasks: tasksContext, currentTime: Date.now() })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      let botReplyText = "";
      if (data.type === "chat") {
        botReplyText = data.reply || "I didn't understand.";
        const botRef = await db.collection("messages").add({ uid: currentUser.uid, role: "bot", text: botReplyText, time: Date.now() });
        addMessageWithDelete("bot", botReplyText, botRef.id);
      } else if (data.type === "task") {
        const title = data.title?.trim();
        if (title) {
          await db.collection("tasks").add({ uid: currentUser.uid, title, description: data.description?.trim() || "", period: data.period?.trim() || "daily", status: "pending", created_at: Date.now() });
          await loadAllTasks();
        }
        botReplyText = data.reply || `Task "${title}" created.`;
        const botRef = await db.collection("messages").add({ uid: currentUser.uid, role: "bot", text: botReplyText, time: Date.now() });
        addMessageWithDelete("bot", botReplyText, botRef.id);
      } else if (data.type === "complete_task") {
        const num = parseInt(data.task_number);
        if (!isNaN(num) && num > 0 && num <= allTasksCache.length) {
          const task = allTasksCache[num - 1];
          const todayStr = new Date().toISOString().slice(0, 10);
          await db.collection("tasks").doc(task.id).collection("completions").add({ date: todayStr, completedAt: Date.now() });
          await loadAllTasks();
        }
        botReplyText = data.reply || `Task ${data.task_number} marked as done.`;
        const botRef = await db.collection("messages").add({ uid: currentUser.uid, role: "bot", text: botReplyText, time: Date.now() });
        addMessageWithDelete("bot", botReplyText, botRef.id);
      } else if (data.type === "edit_task") {
        const num = parseInt(data.task_number);
        if (!isNaN(num) && num > 0 && num <= allTasksCache.length) {
          const task = allTasksCache[num - 1];
          const updates = {};
          if (data.new_title) updates.title = data.new_title;
          if (data.new_description !== undefined) updates.description = data.new_description;
          if (data.new_period) updates.period = data.new_period;
          if (data.new_status) updates.status = data.new_status;
          await db.collection("tasks").doc(task.id).update(updates);
          await loadAllTasks();
        }
        botReplyText = data.reply || `Updated task ${data.task_number}.`;
        const botRef = await db.collection("messages").add({ uid: currentUser.uid, role: "bot", text: botReplyText, time: Date.now() });
        addMessageWithDelete("bot", botReplyText, botRef.id);
      } else if (data.type === "delete_task") {
        const num = parseInt(data.task_number);
        if (!isNaN(num) && num > 0 && num <= allTasksCache.length) {
          await db.collection("tasks").doc(allTasksCache[num - 1].id).delete();
          await loadAllTasks();
        }
        botReplyText = data.reply || `Deleted task ${data.task_number}.`;
        const botRef = await db.collection("messages").add({ uid: currentUser.uid, role: "bot", text: botReplyText, time: Date.now() });
        addMessageWithDelete("bot", botReplyText, botRef.id);
      } else {
        botReplyText = data.reply || "Unknown response";
        const botRef = await db.collection("messages").add({ uid: currentUser.uid, role: "bot", text: botReplyText, time: Date.now() });
        addMessageWithDelete("bot", botReplyText, botRef.id);
      }
    } catch (e) {
      console.error(e);
      addSystemMessage(`Error: ${e.message}. Is Flask running?`);
    } finally {
      isSending = false;
    }
  }
  window.addEventListener("pageshow", () => setActiveMobileMenuItem());
  setActiveMobileMenuItem();
</script>
</body>
</html>
