<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Manddle · Settings</title>
  <link rel="icon" href="favicon.png">
  <style>
    /* Exactly same sidebar CSS as chat.html (no changes), but main content is settings-specific */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fefaf5; --panel: #ffffff; --line: #f0e6dc; --text: #1c1c1e;
      --muted: #6e6e73; --primary-light: #FFE5B4; --secondary: #FFA500;
      --secondary-hover: #e69500; --error: #e03a3a; --success: #2ecc71;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --sidebar-width: 280px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 40px;
    }
    body { font-family: -apple-system, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-width); background: var(--panel); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; position: fixed; height: 100vh;
    }
    .sidebar-logo { padding: 32px 28px 36px 28px; display: flex; align-items: center; gap: 12px; }
    .sidebar-logo img { height: 44px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
    .sidebar-logo span { font-size: 1.55rem; font-weight: 590; background: linear-gradient(135deg, #2c2c2e 0%, var(--secondary) 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav-items { flex:1; display: flex; flex-direction: column; gap: 6px; padding: 0 20px; }
    .nav-item, .settings-nav-item { display: flex; gap: 12px; padding: 12px 18px; text-decoration: none; color: var(--muted); font-weight: 500; border-radius: var(--radius-md); transition: 0.2s; }
    .nav-item:hover, .settings-nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    .nav-item.active, .settings-nav-item.active { background: var(--primary-light); color: var(--secondary); }
    .profile-section { margin: 0 20px 20px 20px; border-top: 1px solid var(--line); padding-top: 16px; }
    .profile-item { padding: 12px 18px; border-radius: var(--radius-md); cursor: pointer; }
    .profile-item:hover { background: rgba(0,0,0,0.04); }
    .main { margin-left: var(--sidebar-width); flex:1; overflow-y: auto; padding: 32px; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 32px; }
    .settings-section { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 28px 32px; margin-bottom: 32px; box-shadow: var(--shadow-sm); }
    .section-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    input { width: 100%; padding: 12px 16px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--bg); font-family: inherit; }
    input:focus { border-color: var(--secondary); outline: none; }
    .btn-primary { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-pill); font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: var(--secondary-hover); }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--line); padding: 10px 20px; border-radius: var(--radius-pill); cursor: pointer; }
    .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); padding: 10px 20px; border-radius: var(--radius-pill); cursor: pointer; }
    .btn-danger:hover { background: var(--error); color: white; }
    .message { margin-top: 12px; padding: 10px; border-radius: var(--radius-md); display: none; }
    .message.success { background: rgba(46,204,113,0.1); color: var(--success); border: 1px solid var(--success); display: block; }
    .message.error { background: rgba(224,58,58,0.1); color: var(--error); border: 1px solid var(--error); display: block; }
    .button-group { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; bottom:0; width:100%; height: auto; flex-direction: row; align-items: center; justify-content: space-evenly; padding: 8px 12px; border-top: 1px solid var(--line); background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); }
      .sidebar-logo, .profile-section { display: none; }
      .nav-items { flex-direction: row; gap: 6px; padding: 0; justify-content: center; }
      .nav-item, .settings-nav-item { padding: 8px 14px; font-size: 0.85rem; border-radius: 30px; }
      .main { margin-left: 0; margin-bottom: 68px; padding: 20px; }
      .settings-section { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="Manddle"><span>Manddle</span></div>
  <div class="nav-items">
    <a href="chat.html" class="nav-item">Chat</a>
    <a href="tasks.html" class="nav-item">Tasks</a>
    <a href="today.html" class="nav-item">Today</a>
    <a href="progress.html" class="nav-item">Progress</a>
    <a href="settings.html" class="settings-nav-item active">Settings</a>
  </div>
  <div class="profile-section"><div class="profile-item" id="profileBtn">Profile</div></div>
</div>
<div class="main"><div class="container"><h1>Settings</h1>
  <div class="settings-section"><div class="section-title">Profile</div>
    <div class="form-group"><label>Your Name</label><input type="text" id="userName" placeholder="Your name"></div>
    <div class="form-group"><label>AI Assistant Name</label><input type="text" id="aiName" placeholder="Manddle"></div>
    <div class="form-group"><label>Interests</label><input type="text" id="interests" placeholder="productivity, coding"></div>
    <button class="btn-primary" id="saveProfileBtn">Save Profile</button><div id="profileMessage" class="message"></div>
  </div>
  <div class="settings-section"><div class="section-title">Security</div>
    <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div>
    <div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div>
    <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPassword"></div>
    <button class="btn-primary" id="changePasswordBtn">Change Password</button><div id="passwordMessage" class="message"></div>
  </div>
  <div class="settings-section"><div class="section-title">Account</div>
    <div class="button-group"><button class="btn-secondary" id="logoutBtn">Logout</button><button class="btn-danger" id="deleteAccountBtn">Delete Account</button></div>
    <div id="accountMessage" class="message"></div>
  </div>
</div></div>
<div id="profileModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter:blur(6px); align-items:center; justify-content:center; z-index:1000;"><div class="modal-content" style="background:var(--panel); padding:32px; border-radius:var(--radius-lg);"><h3>Profile</h3><p>Use the Settings page to edit your details.</p><button class="cancel-btn" id="closeModal">Close</button></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = { apiKey: "AIzaSyBIU3eJBA4ZFyuGV1aDhEUCNIBxhR582eI", authDomain: "manddle.firebaseapp.com", projectId: "manddle", storageBucket: "manddle.firebasestorage.app", messagingSenderId: "126135395338", appId: "1:126135395338:web:22fd0307b5afab46636bf3" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(); const db = firebase.firestore();
  let currentUser = null;
  const userNameInput = document.getElementById("userName"), aiNameInput = document.getElementById("aiName"), interestsInput = document.getElementById("interests");
  const saveProfileBtn = document.getElementById("saveProfileBtn"), profileMessageDiv = document.getElementById("profileMessage");
  const currentPasswordInput = document.getElementById("currentPassword"), newPasswordInput = document.getElementById("newPassword"), confirmPasswordInput = document.getElementById("confirmPassword");
  const changePasswordBtn = document.getElementById("changePasswordBtn"), passwordMessageDiv = document.getElementById("passwordMessage");
  const logoutBtn = document.getElementById("logoutBtn"), deleteAccountBtn = document.getElementById("deleteAccountBtn"), accountMessageDiv = document.getElementById("accountMessage");
  function showMessage(element, message, isError = true) { element.textContent = message; element.className = "message " + (isError ? "error" : "success"); setTimeout(() => { element.style.display = "none"; element.className = "message"; }, 4000); }
  async function loadProfile() { if (!currentUser) return; const doc = await db.collection("profiles").doc(currentUser.uid).get(); const data = doc.exists ? doc.data() : { user_name: "", ai_name: "Manddle", interests: "" }; userNameInput.value = data.user_name || ""; aiNameInput.value = data.ai_name || "Manddle"; interestsInput.value = data.interests || ""; }
  auth.onAuthStateChanged(async (user) => { if (!user) window.location.href = "login.html"; else { currentUser = user; await loadProfile(); } });
  saveProfileBtn.onclick = async () => { if (!currentUser) return; await db.collection("profiles").doc(currentUser.uid).set({ user_name: userNameInput.value.trim(), ai_name: aiNameInput.value.trim() || "Manddle", interests: interestsInput.value.trim() }, { merge: true }); showMessage(profileMessageDiv, "Profile saved.", false); };
  changePasswordBtn.onclick = async () => { if (!currentUser) return; const current = currentPasswordInput.value, newPwd = newPasswordInput.value, confirm = confirmPasswordInput.value; if (!current || !newPwd || !confirm) { showMessage(passwordMessageDiv, "Fill all fields."); return; } if (newPwd !== confirm) { showMessage(passwordMessageDiv, "Passwords do not match."); return; } if (newPwd.length < 6) { showMessage(passwordMessageDiv, "Minimum 6 characters."); return; } try { const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, current); await currentUser.reauthenticateWithCredential(cred); await currentUser.updatePassword(newPwd); showMessage(passwordMessageDiv, "Password updated.", false); currentPasswordInput.value = newPasswordInput.value = confirmPasswordInput.value = ""; } catch (err) { showMessage(passwordMessageDiv, err.code === "auth/wrong-password" ? "Incorrect current password." : err.message); } };
  logoutBtn.onclick = async () => { await auth.signOut(); window.location.href = "login.html"; };
  deleteAccountBtn.onclick = async () => { if (!confirm("Delete account permanently? All data will be lost.")) return; const pwd = prompt("Enter your password to confirm:"); if (!pwd) return; try { const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, pwd); await currentUser.reauthenticateWithCredential(cred); const uid = currentUser.uid; const tasksSnap = await db.collection("tasks").where("uid", "==", uid).get(); for (const taskDoc of tasksSnap.docs) { const compSnap = await taskDoc.ref.collection("completions").get(); for (const comp of compSnap.docs) await comp.ref.delete(); await taskDoc.ref.delete(); } const msgsSnap = await db.collection("messages").where("uid", "==", uid).get(); for (const msg of msgsSnap.docs) await msg.ref.delete(); await db.collection("profiles").doc(uid).delete(); await currentUser.delete(); window.location.href = "login.html"; } catch (err) { alert("Deletion failed: " + err.message); } };
  document.getElementById("profileBtn").onclick = () => document.getElementById("profileModal").style.display = "flex";
  document.getElementById("closeModal").onclick = () => document.getElementById("profileModal").style.display = "none";
</script>
</body>
</html>
