<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Manddle · Today</title>
  <!-- High‑resolution favicon definitions for crisp display -->
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fefaf5; --panel: #ffffff; --line: #f0e6dc; --text: #1c1c1e;
      --muted: #6e6e73; --primary-light: #FFE5B4; --secondary: #FFA500;
      --green: #2ecc71; --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --sidebar-width: 280px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 40px;
    }
    body { font-family: -apple-system, 'SF Pro Text', 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ========== DESKTOP SIDEBAR (consistent across all pages) ========== */
    .sidebar {
      width: var(--sidebar-width); background: var(--panel); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .sidebar-logo { padding: 32px 28px 36px 28px; display: flex; align-items: center; gap: 12px; }
    .sidebar-logo img { height: 44px; width: auto; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
    .sidebar-logo span { font-size: 1.55rem; font-weight: 590; background: linear-gradient(135deg, #2c2c2e 0%, var(--secondary) 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav-items { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 0 20px; }
    .nav-item, .settings-nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 18px;
      text-decoration: none; color: var(--muted); font-weight: 500; border-radius: var(--radius-md);
      transition: 0.2s;
    }
    .nav-item:hover, .settings-nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    .nav-item.active, .settings-nav-item.active { background: var(--primary-light); color: var(--secondary); font-weight: 540; }
    .profile-section { margin: 0 20px 20px 20px; border-top: 1px solid var(--line); padding-top: 16px; }
    .profile-item { padding: 12px 18px; border-radius: var(--radius-md); cursor: pointer; }
    .profile-item:hover { background: rgba(0,0,0,0.04); }

    /* ========== MAIN CONTENT ========== */
    .main { margin-left: var(--sidebar-width); flex: 1; overflow-y: auto; padding: 32px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    .date-badge { color: var(--muted); margin-bottom: 24px; border-left: 4px solid var(--secondary); padding-left: 12px; }
    .columns { display: flex; gap: 24px; flex-wrap: wrap; }
    .column { flex: 1; min-width: 250px; background: var(--panel); border-radius: var(--radius-lg); border: 1px solid var(--line); padding: 20px; }
    .column h3 { font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--secondary); display: inline-block; }
    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-card { background: var(--bg); border-radius: var(--radius-md); padding: 16px; border: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .task-info { flex: 1; }
    .task-title { font-weight: 600; margin-bottom: 4px; }
    .task-desc { font-size: 0.85rem; color: var(--muted); }
    .complete-btn { background: var(--green); border: none; padding: 6px 16px; border-radius: 30px; color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
    .complete-btn:hover { opacity: 0.85; transform: scale(0.96); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }

    /* ========== MOBILE FLOATING BUTTONS & BOTTOM MENU ========== */
    .mobile-top-left, .mobile-top-right {
      display: none;
      position: fixed;
      z-index: 150;
      background: var(--panel);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }
    .mobile-top-left { top: 20px; left: 20px; }
    .mobile-top-right { top: 20px; right: 20px; font-size: 24px; font-weight: 500; color: var(--secondary); background: var(--panel); }
    .mobile-top-left img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: block; }
    .mobile-top-right:hover, .mobile-top-left:hover { transform: scale(1.02); background: var(--primary-light); }

    .mobile-bottom-menu {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: var(--panel);
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
      padding: 24px 20px 28px;
      z-index: 200;
      flex-direction: column;
      gap: 12px;
      border: 1px solid var(--line);
      transition: all 0.2s ease;
    }
    .mobile-bottom-menu.show { display: flex; animation: fadeSlideUp 0.2s ease-out; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .close-menu-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--muted); align-self: flex-end; line-height: 1; padding: 6px 12px; border-radius: 40px; transition: 0.2s; }
    .close-menu-btn:hover { background: rgba(0,0,0,0.05); }
    .nav-items-mobile { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .nav-item-mobile { display: block; padding: 14px 18px; text-decoration: none; color: var(--text); border-radius: 60px; font-weight: 500; background: var(--bg); transition: 0.2s; text-align: center; font-size: 1rem; letter-spacing: -0.2px; }
    .nav-item-mobile.active-mobile { background: var(--primary-light); color: var(--secondary); font-weight: 600; }
    .nav-item-mobile:active { transform: scale(0.97); }
    .mobile-profile-item { padding: 14px 18px; cursor: pointer; border-radius: 60px; background: var(--bg); color: var(--text); font-weight: 500; text-align: center; margin-top: 4px; transition: 0.2s; }
    .mobile-profile-item:active { transform: scale(0.97); background: rgba(0,0,0,0.04); }
    hr.mobile-divider { margin: 8px 0; border-color: var(--line); }

    /* Modal (profile) with consistent close button */
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--panel); padding: 32px; max-width: 400px; width: 90%; border-radius: var(--radius-lg); border: 1px solid var(--line); text-align: center; }
    .modal-content p { margin-bottom: 20px; }
    .cancel-btn { background: var(--bg); color: var(--text); border: 1px solid var(--line); padding: 10px 24px; border-radius: var(--radius-pill); font-weight: 500; cursor: pointer; transition: 0.2s; }
    .cancel-btn:hover { background: rgba(0,0,0,0.04); }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 80px 20px 100px 20px; }  /* extra top padding for floating buttons */
      .columns { flex-direction: column; gap: 20px; }
      .mobile-top-left, .mobile-top-right { display: flex; }
    }
    @media (min-width: 769px) {
      .mobile-top-left, .mobile-top-right, .mobile-bottom-menu { display: none !important; }
    }
  </style>
</head>
<body>

<!-- DESKTOP SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="Manddle"><span>Manddle</span></div>
  <div class="nav-items">
    <a href="chat.html" class="nav-item">Chat</a>
    <a href="tasks.html" class="nav-item">Tasks</a>
    <a href="today.html" class="nav-item active">Today</a>
    <a href="progress.html" class="nav-item">Progress</a>
    <a href="settings.html" class="settings-nav-item">Settings</a>
  </div>
  <div class="profile-section"><div class="profile-item" id="profileBtn">Profile</div></div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="container">
    <h1>Today's Tasks</h1>
    <div class="date-badge" id="dateDisplay"></div>
    <div class="columns" id="columnsContainer">Loading...</div>
  </div>
</div>

<!-- MOBILE FLOATING BUTTONS -->
<div class="mobile-top-left" id="mobileLogoBtn">
  <img src="logo.png" alt="Manddle" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 32 32\'%3E%3Ccircle cx=\'16\' cy=\'16\' r=\'14\' fill=\'%23FFE5B4\' stroke=\'%23FFA500\' stroke-width=\'0.8\'/%3E%3C/svg%3E';">
</div>
<div class="mobile-top-right" id="mobileMenuBtn">☰</div>

<!-- MOBILE BOTTOM MENU (slide-up) -->
<div class="mobile-bottom-menu" id="mobileMenuPanel">
  <div style="display: flex; justify-content: flex-end;">
    <button class="close-menu-btn" id="closeMobileMenuBtn">✕</button>
  </div>
  <div class="nav-items-mobile">
    <a href="chat.html" class="nav-item-mobile" data-nav="chat">Chat</a>
    <a href="tasks.html" class="nav-item-mobile" data-nav="tasks">Tasks</a>
    <a href="today.html" class="nav-item-mobile active-mobile" data-nav="today">Today</a>
    <a href="progress.html" class="nav-item-mobile" data-nav="progress">Progress</a>
    <a href="settings.html" class="nav-item-mobile" data-nav="settings">Settings</a>
    <hr class="mobile-divider">
    <div class="mobile-profile-item" id="mobileProfileBtn">Profile & Preferences</div>
  </div>
</div>

<!-- PROFILE MODAL (shared) -->
<div id="profileModal" class="modal">
  <div class="modal-content">
    <h3>Profile</h3>
    <p>Update your name & interests in the Chat or Settings page.</p>
    <button class="cancel-btn" id="closeModal">Close</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  // ========== FIREBASE INIT ==========
  const firebaseConfig = {
    apiKey: "AIzaSyBIU3eJBA4ZFyuGV1aDhEUCNIBxhR582eI",
    authDomain: "manddle.firebaseapp.com",
    projectId: "manddle",
    storageBucket: "manddle.firebasestorage.app",
    messagingSenderId: "126135395338",
    appId: "1:126135395338:web:22fd0307b5afab46636bf3"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  let currentUser = null;
  const todayStr = new Date().toISOString().slice(0, 10);

  // Display formatted date
  document.getElementById("dateDisplay").innerText = new Date().toLocaleDateString(undefined, {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // ========== MOBILE MENU LOGIC ==========
  const mobileMenuBtn = document.getElementById("mobileMenuBtn");
  const mobileMenuPanel = document.getElementById("mobileMenuPanel");
  const closeMobileMenu = document.getElementById("closeMobileMenuBtn");
  const mobileProfileBtn = document.getElementById("mobileProfileBtn");
  const mobileLogoBtn = document.getElementById("mobileLogoBtn");
  const profileModal = document.getElementById("profileModal");
  const profileBtn = document.getElementById("profileBtn");
  const closeModal = document.getElementById("closeModal");

  function closeBottomMenu() { if (mobileMenuPanel) mobileMenuPanel.classList.remove("show"); }
  function openBottomMenu() { if (mobileMenuPanel) mobileMenuPanel.classList.add("show"); }
  function toggleMobileMenu(e) {
    e?.stopPropagation();
    if (mobileMenuPanel.classList.contains("show")) closeBottomMenu();
    else openBottomMenu();
  }
  function handleDocumentClick(e) {
    if (!mobileMenuPanel) return;
    const isMenuClick = mobileMenuPanel.contains(e.target);
    const isMenuBtnClick = mobileMenuBtn?.contains(e.target);
    if (!isMenuClick && !isMenuBtnClick && mobileMenuPanel.classList.contains("show")) closeBottomMenu();
  }

  mobileMenuBtn?.addEventListener("click", toggleMobileMenu);
  closeMobileMenu?.addEventListener("click", closeBottomMenu);
  document.addEventListener("click", handleDocumentClick);
  if (mobileMenuPanel) mobileMenuPanel.addEventListener("click", (e) => e.stopPropagation());
  if (mobileLogoBtn) mobileLogoBtn.addEventListener("click", () => { window.location.href = "chat.html"; });

  // Profile modal
  function showProfileModal() { profileModal.style.display = "flex"; }
  profileBtn.onclick = showProfileModal;
  if (mobileProfileBtn) mobileProfileBtn.onclick = () => { closeBottomMenu(); showProfileModal(); };
  closeModal.onclick = () => profileModal.style.display = "none";

  // ========== TASK LOGIC ==========
  auth.onAuthStateChanged(user => {
    if (!user) window.location.href = "login.html";
    else {
      currentUser = user;
      loadTodayTasks();
    }
  });

  async function isTaskDueToday(task) {
    const completionsSnap = await db.collection("tasks").doc(task.id).collection("completions").where("date", "==", todayStr).get();
    if (!completionsSnap.empty) return false;
    const period = task.period || 'daily';
    if (period === 'daily') return true;
    const createdDate = new Date(task.created_at || Date.now());
    if (period === 'monthly') return new Date().getDate() === createdDate.getDate();
    if (period === 'yearly') return (new Date().getMonth() === createdDate.getMonth() && new Date().getDate() === createdDate.getDate());
    return false;
  }

  async function loadTodayTasks() {
    const container = document.getElementById("columnsContainer");
    container.innerHTML = '<div class="empty-state">Loading...</div>';
    try {
      const tasksSnap = await db.collection("tasks").where("uid", "==", currentUser.uid).get();
      const tasks = [];
      tasksSnap.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
      const daily = [], monthly = [], yearly = [];
      for (const task of tasks) {
        if (await isTaskDueToday(task)) {
          const period = task.period || 'daily';
          if (period === 'daily') daily.push(task);
          else if (period === 'monthly') monthly.push(task);
          else if (period === 'yearly') yearly.push(task);
          else daily.push(task);
        }
      }
      const renderColumn = (title, tasksList) => `
        <div class="column">
          <h3>${title}</h3>
          <div class="task-list">
            ${tasksList.length === 0 ? '<div class="empty-state">None for today</div>' : tasksList.map(t => `
              <div class="task-card" id="task-${t.id}">
                <div class="task-info">
                  <div class="task-title">${escapeHtml(t.title)}</div>
                  ${t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : ''}
                </div>
                <button class="complete-btn" onclick="markComplete('${t.id}')">Complete</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      container.innerHTML = `<div class="columns">
        ${renderColumn('Daily', daily)}
        ${renderColumn('Monthly', monthly)}
        ${renderColumn('Yearly', yearly)}
      </div>`;
    } catch (e) {
      console.error(e);
      container.innerHTML = '<div class="empty-state">Error loading tasks.</div>';
    }
  }

  window.markComplete = async (taskId) => {
    try {
      await db.collection("tasks").doc(taskId).collection("completions").add({
        date: todayStr,
        completedAt: Date.now()
      });
      await loadTodayTasks(); // re-render
    } catch (e) {
      alert("Could not mark complete.");
    }
  };

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
  }
</script>
</body>
</html>
