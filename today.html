<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manddle · Today</title>
  <link rel="icon" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fefaf5; --panel: #ffffff; --line: #f0e6dc; --text: #1c1c1e;
      --muted: #6e6e73; --primary-light: #FFE5B4; --secondary: #FFA500; --green: #2ecc71;
      --sidebar-width: 280px; --radius-md: 16px; --radius-lg: 24px;
    }
    body { font-family: -apple-system, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-width); background: var(--panel); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; position: fixed; height: 100vh;
    }
    .sidebar-logo { padding: 32px 28px 36px 28px; display: flex; align-items: center; gap: 12px; }
    .sidebar-logo img { height: 44px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
    .sidebar-logo span { font-size: 1.55rem; font-weight: 590; background: linear-gradient(135deg, #2c2c2e 0%, var(--secondary) 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav-items { flex:1; display: flex; flex-direction: column; gap: 6px; padding: 0 20px; }
    .nav-item, .settings-nav-item { display: flex; gap: 12px; padding: 12px 18px; text-decoration: none; color: var(--muted); font-weight: 500; border-radius: var(--radius-md); }
    .nav-item:hover, .settings-nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    .nav-item.active { background: var(--primary-light); color: var(--secondary); }
    .profile-section { margin: 0 20px 20px 20px; border-top: 1px solid var(--line); padding-top: 16px; }
    .profile-item { padding: 12px 18px; border-radius: var(--radius-md); cursor: pointer; }
    .profile-item:hover { background: rgba(0,0,0,0.04); }
    .main { margin-left: var(--sidebar-width); flex:1; overflow-y: auto; padding: 32px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    .date-badge { color: var(--muted); margin-bottom: 24px; border-left: 4px solid var(--secondary); padding-left: 12px; }
    .columns { display: flex; gap: 24px; flex-wrap: wrap; }
    .column { flex: 1; min-width: 250px; background: var(--panel); border-radius: var(--radius-lg); border: 1px solid var(--line); padding: 20px; }
    .column h3 { font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--secondary); display: inline-block; }
    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-card { background: var(--bg); border-radius: var(--radius-md); padding: 16px; border: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .task-info { flex: 1; }
    .task-title { font-weight: 600; margin-bottom: 4px; }
    .task-desc { font-size: 0.85rem; color: var(--muted); }
    .complete-btn { background: var(--green); border: none; padding: 6px 16px; border-radius: 30px; color: white; font-weight: 500; cursor: pointer; }
    .complete-btn:hover { opacity: 0.85; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    @media (max-width: 768px) {
      .sidebar { position: fixed; bottom:0; width:100%; height: auto; flex-direction: row; align-items: center; justify-content: space-evenly; padding: 8px 12px; border-top: 1px solid var(--line); background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); }
      .sidebar-logo, .profile-section { display: none; }
      .nav-items { flex-direction: row; gap: 6px; padding: 0; justify-content: center; }
      .nav-item, .settings-nav-item { padding: 8px 14px; font-size: 0.85rem; border-radius: 30px; }
      .main { margin-left: 0; margin-bottom: 68px; padding: 20px; }
      .columns { flex-direction: column; gap: 20px; }
    }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="Manddle"><span>Manddle</span></div>
  <div class="nav-items">
    <a href="chat.html" class="nav-item">Chat</a>
    <a href="tasks.html" class="nav-item">Tasks</a>
    <a href="today.html" class="nav-item active">Today</a>
    <a href="progress.html" class="nav-item">Progress</a>
    <a href="settings.html" class="settings-nav-item">Settings</a>
  </div>
  <div class="profile-section"><div class="profile-item" id="profileBtn">Profile</div></div>
</div>
<div class="main">
  <div class="container">
    <h1>Today's Tasks</h1>
    <div class="date-badge" id="dateDisplay"></div>
    <div class="columns" id="columnsContainer">Loading...</div>
  </div>
</div>
<div id="profileModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter:blur(6px); align-items:center; justify-content:center; z-index:1000;"><div class="modal-content" style="background:var(--panel); padding:32px; border-radius:var(--radius-lg);"><h3>Profile</h3><p>Update in Chat page.</p><button class="cancel-btn" id="closeModal">Close</button></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = { apiKey: "AIzaSyBIU3eJBA4ZFyuGV1aDhEUCNIBxhR582eI", authDomain: "manddle.firebaseapp.com", projectId: "manddle", storageBucket: "manddle.firebasestorage.app", messagingSenderId: "126135395338", appId: "1:126135395338:web:22fd0307b5afab46636bf3" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(); const db = firebase.firestore();
  let currentUser = null;
  const todayStr = new Date().toISOString().slice(0,10);
  document.getElementById("dateDisplay").innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  auth.onAuthStateChanged(user => { if (!user) window.location.href = "login.html"; else { currentUser = user; loadTodayTasks(); } });
  async function isTaskDueToday(task) {
    const completionsSnap = await db.collection("tasks").doc(task.id).collection("completions").where("date", "==", todayStr).get();
    if (!completionsSnap.empty) return false;
    const period = task.period || 'daily';
    if (period === 'daily') return true;
    const createdDate = new Date(task.created_at || Date.now());
    if (period === 'monthly') return new Date().getDate() === createdDate.getDate();
    if (period === 'yearly') return (new Date().getMonth() === createdDate.getMonth() && new Date().getDate() === createdDate.getDate());
    return false;
  }
  async function loadTodayTasks() {
    const container = document.getElementById("columnsContainer");
    container.innerHTML = '<div class="empty-state">Loading...</div>';
    try {
      const tasksSnap = await db.collection("tasks").where("uid", "==", currentUser.uid).get();
      const tasks = []; tasksSnap.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
      const daily = [], monthly = [], yearly = [];
      for (const task of tasks) {
        if (await isTaskDueToday(task)) {
          const period = task.period || 'daily';
          if (period === 'daily') daily.push(task);
          else if (period === 'monthly') monthly.push(task);
          else if (period === 'yearly') yearly.push(task);
          else daily.push(task);
        }
      }
      const renderColumn = (title, tasksList) => `<div class="column"><h3>${title}</h3><div class="task-list">${tasksList.length===0?'<div class="empty-state">None for today</div>':tasksList.map(t=>`<div class="task-card" id="task-${t.id}"><div class="task-info"><div class="task-title">${escapeHtml(t.title)}</div>${t.description?`<div class="task-desc">${escapeHtml(t.description)}</div>`:''}</div><button class="complete-btn" onclick="markComplete('${t.id}')">Complete</button></div>`).join('')}</div></div>`;
      container.innerHTML = `<div class="columns">${renderColumn('Daily', daily)}${renderColumn('Monthly', monthly)}${renderColumn('Yearly', yearly)}</div>`;
    } catch(e) { console.error(e); container.innerHTML = '<div class="empty-state">Error loading tasks.</div>'; }
  }
  window.markComplete = async (taskId) => {
    try {
      await db.collection("tasks").doc(taskId).collection("completions").add({ date: todayStr, completedAt: Date.now() });
      await loadTodayTasks(); // re-render columns
    } catch(e) { alert("Could not mark complete."); }
  };
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  document.getElementById("profileBtn").onclick = () => document.getElementById("profileModal").style.display = "flex";
  document.getElementById("closeModal").onclick = () => document.getElementById("profileModal").style.display = "none";
</script>
</body>
</html>
